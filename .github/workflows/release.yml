name: signed-tag-artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the verified npm tarball with provenance
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify signed tag
        if: startsWith(github.ref, 'refs/tags/')
        run: git verify-tag "${GITHUB_REF_NAME}"
      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:release
      - uses: actions/upload-artifact@v7
        with:
          name: omnibranch-${{ github.ref_name }}
          path: artifacts/
          if-no-files-found: error

  publish-npm:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm == true
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: omnibranch-${{ github.ref_name }}
          path: artifacts
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Publish verified tarball with provenance
        run: npm publish artifacts/omnibranch-0.2.0.tgz --provenance --access public
