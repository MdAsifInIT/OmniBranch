<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">OmniBranch icon</title>
  <desc id="desc">OmniBranch vector icon mark featuring a circular branch orchestration symbol.</desc>
  
  <defs>
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="45%" stop-color="#00B0FF"/>
      <stop offset="75%" stop-color="#651FFF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B0FF"/>
    </linearGradient>
  </defs>

  <!-- Container -->
  <rect width="800" height="800" rx="170" ry="170" fill="#0B0F19"/>

  <!-- Ring with Gaps -->
  <path d="M 265 245 A 210 210 0 1 0 535 555" fill="none" stroke="url(#ringGrad)" stroke-width="42" stroke-linecap="round"/>

  <!-- Central Trunk -->
  <line x1="400" y1="140" x2="400" y2="660" stroke="url(#nexusGrad)" stroke-width="26" stroke-linecap="round"/>

  <!-- Branching Paths -->
  <path d="M 400 380 L 530 250 L 590 250" fill="none" stroke="url(#nexusGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 470 310 L 530 200 L 570 200" fill="none" stroke="url(#nexusGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 400 450 L 480 490 L 610 490" fill="none" stroke="url(#nexusGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 520 490 L 570 540" fill="none" stroke="url(#nexusGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 400 320 L 330 260 L 260 260" fill="none" stroke="url(#nexusGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 330 260 L 300 210 M 360 286 L 350 210" fill="none" stroke="url(#nexusGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 400 420 L 300 420 L 230 420" fill="none" stroke="url(#nexusGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 300 420 L 250 360 M 300 420 L 250 480" fill="none" stroke="url(#nexusGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 400 560 L 340 620 L 300 620" fill="none" stroke="url(#nexusGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 400 520 L 480 590 L 550 590" fill="none" stroke="url(#nexusGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 480 590 L 530 650" fill="none" stroke="url(#nexusGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Terminal Nodes -->
  <circle cx="400" cy="140" r="20" fill="url(#nexusGrad)"/>
  <circle cx="400" cy="660" r="20" fill="url(#nexusGrad)"/>

  <circle cx="590" cy="250" r="18" fill="url(#nexusGrad)"/>
  <circle cx="570" cy="200" r="16" fill="url(#nexusGrad)"/>
  <circle cx="530" cy="200" r="14" fill="url(#nexusGrad)"/>

  <circle cx="610" cy="490" r="18" fill="url(#nexusGrad)"/>
  <circle cx="570" cy="540" r="16" fill="url(#nexusGrad)"/>

  <circle cx="260" cy="260" r="18" fill="url(#nexusGrad)"/>
  <circle cx="300" cy="210" r="16" fill="url(#nexusGrad)"/>
  <circle cx="350" cy="210" r="14" fill="url(#nexusGrad)"/>

  <circle cx="230" cy="420" r="18" fill="url(#nexusGrad)"/>
  <circle cx="250" cy="360" r="16" fill="url(#nexusGrad)"/>
  <circle cx="250" cy="480" r="16" fill="url(#nexusGrad)"/>

  <circle cx="300" cy="620" r="18" fill="url(#nexusGrad)"/>

  <circle cx="550" cy="590" r="18" fill="url(#nexusGrad)"/>
  <circle cx="530" cy="650" r="16" fill="url(#nexusGrad)"/>

</svg>
